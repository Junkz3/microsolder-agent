<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 400"
  width="400"
  height="400"
  role="img"
  aria-label="Wrench Board mascot"
>
  <defs>
    <style><![CDATA[
      :root {
        --mascot-body: #2DD4BF;
        --mascot-detail: #111827;
        --mascot-eye-shine: #FFFFFF;
      }
      .mascot-body { fill: var(--mascot-body, #2DD4BF); }
      .mascot-detail-fill { fill: var(--mascot-detail, #111827); }
      .mascot-detail-stroke {
        fill: none;
        stroke: var(--mascot-detail, #111827);
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .mascot-eye-shine { fill: var(--mascot-eye-shine, #FFFFFF); }
    ]]></style>
  </defs>

  <!-- LEGS -->
  <g id="legs">
    <rect class="mascot-detail-fill" x="135" y="285" width="14" height="38" rx="3" />
    <rect class="mascot-detail-fill" x="175" y="285" width="14" height="38" rx="3" />
    <rect class="mascot-detail-fill" x="215" y="285" width="14" height="38" rx="3" />
    <rect class="mascot-detail-fill" x="255" y="285" width="14" height="38" rx="3" />
  </g>

  <!-- LEFT ARM -->
  <g id="arm-left" style="transform-origin: 115px 200px;">
    <path
      class="mascot-detail-stroke"
      stroke-width="14"
      d="M 115 200 Q 95 240, 95 275"
    />
    <circle class="mascot-detail-fill" cx="95" cy="282" r="11" />
  </g>

  <!-- RIGHT ARM holding the wrench -->
  <g id="arm-right" style="transform-origin: 285px 200px;">
    <path
      class="mascot-detail-stroke"
      stroke-width="14"
      d="M 285 200 Q 320 175, 335 145"
    />

    <!-- WRENCH: built upright in local frame, then rotated -->
    <g id="wrench" style="transform-origin: 335px 145px;">
      <g transform="rotate(20 335 145)">
        <!--
          Single closed silhouette: open-end wrench.
            - straight handle in the middle (width ~26)
            - chunky head at top with a deep U-notch between two thick jaws
          Symmetric around x=335; head spans x=300..370, y=44..80.
        -->
        <path
          class="mascot-detail-fill"
          d="M 322 145
             L 322 88
             Q 322 82, 317 80
             L 305 76
             Q 300 74, 300 68
             L 300 51
             Q 300 44, 307 44
             L 324 44
             Q 327 44, 327 47
             L 327 60
             Q 327 64, 331 64
             L 339 64
             Q 343 64, 343 60
             L 343 47
             Q 343 44, 346 44
             L 363 44
             Q 370 44, 370 51
             L 370 68
             Q 370 74, 365 76
             L 353 80
             Q 348 82, 348 88
             L 348 145
             Z"
        />
      </g>
    </g>
  </g>

  <!-- BODY -->
  <g id="body">
    <rect
      class="mascot-body"
      x="115" y="125" width="170" height="170"
      rx="28" ry="28"
    />
    <rect
      x="135" y="145" width="130" height="130"
      rx="18" ry="18"
      fill="#000" fill-opacity="0.06"
    />
  </g>

  <!-- FACE -->
  <g id="face">
    <g id="eye-left">
      <circle class="mascot-detail-fill" cx="172" cy="205" r="13" />
      <circle class="mascot-eye-shine" cx="176" cy="201" r="3.5" />
    </g>
    <g id="eye-right">
      <circle class="mascot-detail-fill" cx="228" cy="205" r="13" />
      <circle class="mascot-eye-shine" cx="232" cy="201" r="3.5" />
    </g>
    <g id="mouth">
      <path
        class="mascot-detail-stroke"
        stroke-width="5"
        d="M 188 240 Q 200 252, 212 240"
      />
    </g>
  </g>
</svg>
